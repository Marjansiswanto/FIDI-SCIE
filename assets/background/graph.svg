<?xml version="1.0" encoding="UTF-8"?>

<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1920 1080">

<defs>

<linearGradient
id="graphGradient"
x1="0%"
y1="0%"
x2="100%"
y2="0%">

<stop
offset="0%"
stop-color="#00C6FF"/>

<stop
offset="100%"
stop-color="#66F6FF"/>

</linearGradient>

<filter id="graphGlow">

<feGaussianBlur
stdDeviation="3"
result="blur"/>

<feMerge>

<feMergeNode
in="blur"/>

<feMergeNode
in="SourceGraphic"/>

</feMerge>

</filter>

</defs>

<g
id="financeGraph"
fill="none"
stroke="url(#graphGradient)"
stroke-width="3"
filter="url(#graphGlow)">

<path
id="graphLine"

d="

M120 860

L220 830

L320 845

L420 790

L520 810

L620 730

L720 760

L820 670

L920 710

L1020 590

L1120 640

L1220 520

L1320 560

L1420 450

L1520 500

L1620 370

L1720 430

L1820 300

"/>

</g>

<g
fill="#7CF7FF">

<circle
id="graphPoint"
cx="1820"
cy="300"
r="6"/>

</g>

</svg>
